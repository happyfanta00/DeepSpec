# DSpark-OPD recipe config (overlay on verl's ppo_trainer.yaml).
# S1: real target-cache dataset; single-GPU; reaches the `data` gate with real samples.
hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

# ---------------- data ----------------
data:
  # train_files/val_files are unused (our dataset reads the prompt jsonl) but must be valid strings
  # for verl's create_rl_dataset signature.
  train_files: /tmp/dspark_opd_dummy.parquet
  val_files: /tmp/dspark_opd_dummy.parquet
  train_batch_size: 2
  max_prompt_length: 4096
  max_response_length: 64
  shuffle: false
  # 8 dataloader workers prefetch the (cheap, tokens-only) prompts in parallel. A benign "DataLoader
  # worker killed" traceback may appear at fit() teardown (rc still 0, checkpoint intact).
  dataloader_num_workers: 8
  # inject our dataset via verl's create_rl_dataset custom_cls seam. DSparkPromptDataset yields raw
  # prompts (golden chat template); upstream DSPARK sglang generates the response LIVE at train time.
  custom_cls:
    path: recipe/dspark_opd/dataset.py
    name: DSparkPromptDataset
  # DSpark dataset params: raw prompt-only corpus (user conversations, NO assistant), golden chat
  # template (enable_thinking=False) so the rollout prompt matches training/eval exactly.
  dspark:
    n_samples: -1      # training cap; <=0 -> full dataset. Must be >= train_batch_size.
    # absolute path — run.sh cd's into third_party/verl, so a relative path resolves wrong.
    prompt_jsonl_path: /home/ec2-user/efs_data/workspace/DeepSpec/train_datasets/perfectblend_train.jsonl
    prompt_max_length: 4096
    enable_thinking: false

# ---------------- algorithm ----------------
algorithm:
  # Step-1 loss decoupling: the OPD loss is computed by self-contained differentiable operators
  # (recipe/dspark_opd/losses.py), NOT by verl's reward→advantage→policy-gradient path. The
  # adv_estimator below is unused by the DSpark loss (kept only to satisfy verl config schema).
  adv_estimator: token_reward_direct
  use_kl_in_reward: false

# ---------------- actor / rollout / ref ----------------
actor_rollout_ref:
  model:
    path: /mnt/scratch/checkpoints/deepspec/dspark_block7_qwen3_4b/step_latest  # draft weights
    override_config:             # open dict on HFModelConfig; carries our custom keys
                                 # (RolloutConfig is a typed dataclass that rejects unknown keys)
      # draft ckpt has NO tokenizer files -> tokenizer from TARGET (draft shares vocab, §2.2)
      dspark_tokenizer_path: Qwen/Qwen3-4B
      # teacher (target) for the FUSED train_step's in-worker scoring (built by _build_teacher)
      dspark_teacher_path: Qwen/Qwen3-4B
      # A = data-driven #decode-rounds (no hard cap by default, §层面1). Real
      # responses have vc=90-126 blocks >> 32. Set dspark_max_anchors_cap>0 to hard-cap (drop tail
      # rounds) after training-corpus round-count stats; 0 = unlimited (size A to batch max).
      # ★ CAPPED at 64 (2026-07-19): max_new_tokens=2048 / accept_len~6 => a long response can reach
      # ~340 decode rounds; with cap=0 the full-vocab teacher/draft forwards materialize
      # [B, A~340, blk=7, V=151936] tensors, and a DP rank that draws a long response peaks ~68G
      # (others 23-38G — data-dependent imbalance) → OOM at the next step's rollout/T6. Capping A=64
      # bounds the worst-case tensor to ~1/5. Tail rounds beyond 64 are dropped (loud log in
      # reconstruct_block_plan). Revisit after corpus round-count stats (§层面1).
      dspark_max_anchors_cap: 256
      # TRAIN-rollout max_new_tokens override (sglang path). The eval GOLDEN is 2048; the long
      # response tail dominates rollout wall time (p50~338 vs max~1560, tail runs alone on the tp
      # server). Shorten to cut it. 1024 ≈ the cap=256 rounds × accept_len window (so few rounds are
      # dropped). ⚠️ DEVIATES from eval golden — verify accept length at 2048 before finalizing.
      # 0 = keep the golden 2048.
      dspark_rollout_max_new_tokens: 1024
      # top-k dense OPD (tensor-contract K); rollout count n is verl rollout.n (batch dim)
      log_prob_top_k: 16         # K: top-k dense OPD candidates (only_stu); 0 -> single-sample
      # T5 (sglang path) candidate algo: teacher scores its OWN top-`dspark_teacher_top_k`; draft's
      # top-`log_prob_top_k` is the loss support; teacher logπ on draft ids uses its value if in
      # its top-k else min(top-k) (§5.8). Only used on DSPARK_SGLANG_ROLLOUT=1.
      dspark_teacher_top_k: 64
      # Step-1 decoupled loss (recipe/dspark_opd/losses.py + loss_config.py). The OPD loss is a
      # weighted sum of self-contained differentiable operators — NOT reward/advantage/PPO.
      # NOTE: these MUST be flat scalar keys (not a nested dict). verl's update_model_config
      # (utils/model.py:66) recurses into any dict-valued override_config key as if it were a
      # nested HF sub-config -> a nested `dspark_loss:` block crashes with AttributeError on
      # Qwen3Config. So loss knobs are flat `dspark_loss_*` keys, like every other DSpark key.
      dspark_loss_reverse_kl_weight: 0.0   # top-K reverse-KL, pathwise/analytic grad (D1 topk_pathwise)
      dspark_loss_forward_kl_weight: 1.0
      dspark_loss_confidence_weight: 1.0   # acceptance-rate BCE weight (was confidence_head_alpha)
      dspark_loss_reject_kl_weight: 1.0
      dspark_loss_reverse_kl_mode: topk_pathwise  # only topk_pathwise implemented (k3/reinforce deferred, D2)
      dspark_loss_decay_gamma: 4.0         # block-internal exp(-pos/γ) decay (SFT-consistent; applied ONCE)
      dspark_loss_agg_mode: token-mean
      dspark_loss_max_clamp: null          # optional symmetric per-token loss clamp (null = off)
  actor:
    strategy: fsdp
    use_kl_loss: false
    ppo_mini_batch_size: 16          # prompt units; verl normalizes ×rollout.n÷dp -> per-GPU mini
    ppo_micro_batch_size_per_gpu: 4  # per-GPU micro; update_dspark_opd splits+accumulates (§S4)
    fsdp_config:
      # actor uses ShardingStrategy.NO_SHARD (set in worker._build_model_optimizer): per-card
      # full params + cross-rank grad all-reduce. fsdp_size=-1 -> self.device_mesh is 1D (size
      # == world) so verl's ppo_mini_batch_size //= device_mesh.size() normalization is correct.
      # (Do NOT use fsdp_size=1: its degenerate HYBRID mesh doesn't all-reduce grads; see §2.6.5.)
      fsdp_size: -1
      use_orig_params: true        # required: frozen embed/lm_head
      forward_prefetch: false
      mixed_precision:
        param_dtype: bf16
        reduce_dtype: fp32
        buffer_dtype: bf16
  rollout:
    name: dspark                 # -> ("dspark","sync") registered in recipe __init__
    mode: sync
    n: 4                         # rollout count (RL semantics): repeat each sample n times in batch
    tensor_model_parallel_size: 1  # our rollout is single-device PyTorch (no TP)

# ---------------- reward model (teacher) ----------------
# FUSED design: teacher is built INSIDE the actor worker (_build_teacher) and scored inside
# train_step — NOT a separate RewardModel worker/role. So enable=false (task_runner skips
# reward-worker registration; RayPPOTrainer's use_rm becomes false automatically). Teacher path
# comes from actor_rollout_ref.model.override_config.dspark_teacher_path (below).
reward_model:
  enable: false

# ---------------- trainer ----------------
trainer:
  n_gpus_per_node: 1
  nnodes: 1
  # Standard verl control: epochs primary. Default 1 epoch = one full pass over the dataset
  # (total_training_steps=null -> derived as len(train_dataloader) * total_epochs). Set
  # total_training_steps to an int to cap at a fixed step count instead (may stop mid-epoch).
  total_epochs: 1
  total_training_steps: null
  save_freq: 2000               # checkpoint every N steps (-1=never; final step always saved)
  val_before_train: false
  logger: [console]
  project_name: dspark_opd
  experiment_name: dspark_opd    # override per-run via run.sh EXP=...
